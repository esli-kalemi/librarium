<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Librarium — Categories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboardstyle.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <img src="../images/logo.png" alt="Librarium Logo" style="height:32px; width:auto;">
            <span>LIBRARIUM</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a></li>
            <li><a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a></li>
            <li><a href="admin-activity.html"><i class="fa-solid fa-user-shield"></i> Activity Log</a></li>
            <li><a href="#books"><i class="fa-solid fa-book"></i> Books</a></li>
            <li><a href="categories.html" class="active"><i class="fa-solid fa-tags"></i> Categories</a></li>
            <li><a href="#authors"><i class="fa-solid fa-feather"></i> Authors</a></li>
            <li><a href="#clients"><i class="fa-solid fa-users"></i> Clients</a></li>
            <li><a href="#orders"><i class="fa-solid fa-cart-shopping"></i> Orders</a></li>
            <li><a href="#inventory"><i class="fa-solid fa-warehouse"></i> Inventories</a></li>
            <li class="logout"><a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </aside>

    <main class="main">
        <div class="topbar">
            <span class="topbar-title">BOOK CATEGORIES</span>
            <div class="topbar-right">
                <a href="dashboard.html"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
                <a href="categories.html" class="active"><i class="fa-solid fa-tags"></i> Categories</a>
                <a href="notifications.html"><i class="fa-solid fa-bell"></i> Notifications</a>
            </div>
        </div>

        <div class="content">
            <div class="section-block">
                <div class="section-header blue">
                    <i class="fa-solid fa-tags"></i>
                    <h2>Book Categories</h2>
                </div>
                <div class="section-body">
                    <div class="btn-row">
                        <button class="btn btn-gold sort-btn active" onclick="sortBooks('latest', this)">Latest</button>
                        <button class="btn btn-secondary sort-btn" onclick="sortBooks('shipped', this)">Most Shipped</button>
                        <button class="btn btn-secondary sort-btn" onclick="sortBooks('stock', this)">Most Stock</button>
                    </div>
                    <div id="categoriesContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/categories.js"></script>
</body>
</html>
